<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2d95"/>
      <stop offset="50%" stop-color="#c8ff00"/>
      <stop offset="100%" stop-color="#00e8ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <rect x="120" y="60" width="400" height="280" rx="20" fill="#1c1916" stroke="rgba(250,246,239,0.1)" stroke-width="2"/>
  <text x="320" y="110" text-anchor="middle" fill="#6b635a" font-family="monospace" font-size="11" letter-spacing="2">BGMI PROFILE</text>
  <text x="180" y="195" text-anchor="middle" fill="#ff2d95" font-size="28" filter="url(#glow)">꧁</text>
  <text x="320" y="200" text-anchor="middle" fill="#faf6ef" font-family="serif" font-size="26">ProGamer</text>
  <text x="460" y="195" text-anchor="middle" fill="#00e8ff" font-size="28" filter="url(#glow)">꧂</text>
  <text x="140" y="250" text-anchor="middle" fill="#c8ff00" font-size="22">★ ✦ ⚡</text>
  <text x="500" y="250" text-anchor="middle" fill="#c8ff00" font-size="22">✿ ♛ 👑</text>
  <rect x="200" y="280" width="240" height="36" rx="8" fill="rgba(200,255,0,0.1)" stroke="rgba(200,255,0,0.35)" stroke-width="1"/>
  <text x="320" y="303" text-anchor="middle" fill="#c8ff00" font-family="monospace" font-size="12">COPY PASTE SYMBOLS</text>
  <rect x="0" y="396" width="640" height="4" fill="url(#accent)" opacity="0.7"/>
  <text x="320" y="390" text-anchor="middle" fill="#a89f94" font-family="monospace" font-size="10" letter-spacing="3">BGMI SYMBOLS LIBRARY</text>
</svg>
